name: Bug report
description: Report a WhisprAI OpenClaw plugin problem.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the early public release.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Tell us what you expected and what actually happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install plugin
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Ubuntu, Kali, etc.
  - type: input
    id: openclaw
    attributes:
      label: OpenClaw version
      placeholder: openclaw --version
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove secrets, relay tokens, inbound secrets, and private data before posting.
      render: shell
